<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIC Corp.</title>
    <!-- Import map for PlayCanvas (used by splat viewer and camera-controls script) -->
    <script type="importmap">
    {
        "imports": {
            "playcanvas": "https://cdn.jsdelivr.net/npm/playcanvas/+esm"
        }
    }
    </script>
    <!-- Styles (Modular CSS) -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="icon" type="image/png" href="/ticLOGO.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

    <!-- SEO Meta Tags -->
    <meta name="description" content="BEST RAT TEES ON THE INTERNET. New from TIC Corp: Rattire. Aura-friendly graphic tees parodying icons like Aphex Twin and Edward Scissorhands, all with a rat twist. We just do whatever we like.">
    <link rel="canonical" href="https://www.laughwithtic.com/" />

    <!-- Open Graph / Facebook Meta Tags -->
    <meta property="og:title" content="TIC Corp.">
    <meta property="og:description" content="BEST RAT TEES ON THE INTERNET.">
    <meta property="og:image" content="https://www.laughwithtic.com/previewImage.jpg">
    <meta property="og:url" content="https://www.laughwithtic.com/">
    <meta property="og:type" content="website">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="TIC Corp.">
    <meta name="twitter:description" content="BEST RAT TEES ON THE INTERNET.">
    <meta name="twitter:image" content="https://www.laughwithtic.com/previewImage.jpg">
</head>
<body class="home">
    <!-- Header -->
    <header id="mainLogoHeader">
        <img src="/rateryxLogo.png" alt="TIC Corp. Logo" class="header-logo">
    </header>

    <!-- Floating Buy Button -->
    <button id="buyJacketBtn" class="floating-buy-btn">Buy Jacket</button>

    <!-- Gaussian splat viewer (.sog) -->
    <main class="splat-viewer-wrap" id="splatViewerWrap" aria-label="3D splat view">
        <div id="splat-viewer" data-sog="/jacket.sog"
     data-camera-position="0,0,2.5"
     data-splat-position="-2.2,0.3,-6"
     data-splat-rotation="0,180,180"></div>
    </main>

    <!-- Scripts -->
    <script src="/index.js" defer></script>
    <script src="/splat-viewer.js" type="module" defer></script>

    <!-- Footer -->
    <footer id="mainFooter">
        <p class="footer-text">Copyright © 2025-World End TIC Corp. All rights reserves.</p>
    </footer>

    <!-- Product Modal -->
    <div id="jacketModalOverlay" class="modal-overlay">
        <div id="jacketModal" class="product-modal">
            <button id="jacketModalClose" class="modal-close-x">&times;</button>
            
            <div class="product-modal-content">
                <!-- Image Carousel -->
                <div class="product-carousel">
                    <div class="carousel-images">
                        <img src="/image0.webp" alt="Jacket view 1" class="carousel-img active" data-index="0">
                        <img src="/image1.webp" alt="Jacket view 2" class="carousel-img" data-index="1">
                        <img src="/image2.webp" alt="Jacket view 3" class="carousel-img" data-index="2">
                        <img src="/image3.webp" alt="Jacket view 4" class="carousel-img" data-index="3">
                    </div>
                    <button class="carousel-nav carousel-prev">&lt;</button>
                    <button class="carousel-nav carousel-next">&gt;</button>
                    <div class="carousel-dots">
                        <span class="dot active" data-index="0"></span>
                        <span class="dot" data-index="1"></span>
                        <span class="dot" data-index="2"></span>
                        <span class="dot" data-index="3"></span>
                    </div>
                </div>

                <!-- Product Details -->
                <div class="product-details">
                    <h2 class="product-name">Rat'teryx Jacket</h2>
                    <p class="product-price" data-price="8888">$88.88</p>

                    <!-- Size Guide Link -->
                    <button class="size-guide-link" id="jacketSizeGuideBtn">Size Guide</button>

                    <!-- Multi-Size Selector -->
                    <div class="size-selector">
                        <label class="selector-label">Quantity</label>
                        <div class="size-options">
                            <div class="size-row" data-size="S">
                                <span class="size-label">S</span>
                                <div class="qty-control">
                                    <button class="qty-btn qty-minus">-</button>
                                    <span class="qty-value">0</span>
                                    <button class="qty-btn qty-plus">+</button>
                                </div>
                            </div>
                            <div class="size-row" data-size="M">
                                <span class="size-label">M</span>
                                <div class="qty-control">
                                    <button class="qty-btn qty-minus">-</button>
                                    <span class="qty-value">0</span>
                                    <button class="qty-btn qty-plus">+</button>
                                </div>
                            </div>
                            <div class="size-row" data-size="L">
                                <span class="size-label">L</span>
                                <div class="qty-control">
                                    <button class="qty-btn qty-minus">-</button>
                                    <span class="qty-value">0</span>
                                    <button class="qty-btn qty-plus">+</button>
                                </div>
                            </div>
                            <div class="size-row" data-size="XL">
                                <span class="size-label">XL</span>
                                <div class="qty-control">
                                    <button class="qty-btn qty-minus">-</button>
                                    <span class="qty-value">0</span>
                                    <button class="qty-btn qty-plus">+</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Order Summary -->
                    <div class="order-summary">
                        <div class="summary-row total">
                            <span id="totalItems">0 items</span>
                            <span id="totalPrice">$0</span>
                        </div>
                    </div>

                    <!-- Confirm Button -->
                    <button id="confirmCheckoutBtn" disabled>
                        Checkout
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Size Guide Popup -->
    <div id="jacketSizeGuidePopup" class="size-guide-popup">
        <div class="size-guide-content">
            <button id="closeJacketSizeGuide" class="size-guide-close">&times;</button>
            <h3>Jacket Size Guide</h3>
            <table class="size-guide-table">
                <thead>
                    <tr>
                        <th>SIZE</th>
                        <th>CHEST</th>
                        <th>LENGTH</th>
                        <th>SLEEVE</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>S</td>
                        <td>22"</td>
                        <td>26"</td>
                        <td>24"</td>
                    </tr>
                    <tr>
                        <td>M</td>
                        <td>24"</td>
                        <td>28"</td>
                        <td>25"</td>
                    </tr>
                    <tr>
                        <td>L</td>
                        <td>26"</td>
                        <td>30"</td>
                        <td>26"</td>
                    </tr>
                    <tr>
                        <td>XL</td>
                        <td>28"</td>
                        <td>32"</td>
                        <td>27"</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Product Modal Script -->
    <script>
    (function() {
        // DOM Elements
        const buyBtn = document.getElementById('buyJacketBtn');
        const modalOverlay = document.getElementById('jacketModalOverlay');
        const modal = document.getElementById('jacketModal');
        const modalClose = document.getElementById('jacketModalClose');
        const confirmBtn = document.getElementById('confirmCheckoutBtn');
        
        // Carousel Elements
        const carouselImages = document.querySelectorAll('.carousel-img');
        const carouselDots = document.querySelectorAll('.dot');
        const prevBtn = document.querySelector('.carousel-prev');
        const nextBtn = document.querySelector('.carousel-next');
        
        // Size Guide Elements
        const sizeGuideBtn = document.getElementById('jacketSizeGuideBtn');
        const sizeGuidePopup = document.getElementById('jacketSizeGuidePopup');
        const closeSizeGuide = document.getElementById('closeJacketSizeGuide');
        
        // Size Selection State
        const sizeQuantities = { S: 0, M: 0, L: 0, XL: 0 };
        const pricePerItem = parseInt(document.querySelector('.product-price').dataset.price) || 8888;
        
        let currentSlide = 0;

        // Open Modal
        function openModal() {
            modalOverlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        // Close Modal
        function closeModal() {
            modalOverlay.style.display = 'none';
            document.body.style.overflow = '';
        }

        // Carousel Functions
        function showSlide(index) {
            carouselImages.forEach((img, i) => {
                img.classList.toggle('active', i === index);
            });
            carouselDots.forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
            currentSlide = index;
        }

        function nextSlide() {
            const next = (currentSlide + 1) % carouselImages.length;
            showSlide(next);
        }

        function prevSlide() {
            const prev = (currentSlide - 1 + carouselImages.length) % carouselImages.length;
            showSlide(prev);
        }

        // Update Order Summary
        function updateSummary() {
            const totalItems = Object.values(sizeQuantities).reduce((a, b) => a + b, 0);
            const totalCents = totalItems * pricePerItem;
            const totalDollars = (totalCents / 100).toFixed(0);
            
            document.getElementById('totalItems').textContent = totalItems;
            document.getElementById('totalPrice').textContent = `$${totalDollars}`;
            confirmBtn.disabled = totalItems === 0;
        }

        // Size Quantity Controls
        document.querySelectorAll('.size-row').forEach(row => {
            const size = row.dataset.size;
            const minusBtn = row.querySelector('.qty-minus');
            const plusBtn = row.querySelector('.qty-plus');
            const qtyValue = row.querySelector('.qty-value');

            minusBtn.addEventListener('click', () => {
                if (sizeQuantities[size] > 0) {
                    sizeQuantities[size]--;
                    qtyValue.textContent = sizeQuantities[size];
                    updateSummary();
                }
            });

            plusBtn.addEventListener('click', () => {
                sizeQuantities[size]++;
                qtyValue.textContent = sizeQuantities[size];
                updateSummary();
            });
        });

        // Build Cart for Checkout
        function buildCart() {
            const cart = [];
            Object.entries(sizeQuantities).forEach(([size, qty]) => {
                if (qty > 0) {
                    cart.push({
                        name: "Rat'teryx Jacket",
                        fit: 'N/A',
                        size: size,
                        price: pricePerItem,
                        quantity: qty,
                        imageSrc: '/image0.webp'
                    });
                }
            });
            return cart;
        }

        // Checkout Handler
        async function handleCheckout() {
            const cart = buildCart();
            if (cart.length === 0) return;

            confirmBtn.disabled = true;
            confirmBtn.textContent = 'Processing...';

            try {
                const origin = window.location.origin;
                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cart })
                });

                if (!response.ok) {
                    throw new Error('Checkout request failed');
                }

                const { sessionId, error } = await response.json();
                
                if (error) {
                    throw new Error(error.message || 'Checkout error');
                }

                // Redirect to Stripe Checkout
                const stripe = Stripe('pk_live_51QzsaZKauXLQMGFmKGhvfwBGIbDxssh2SvBciclIqPxHUeUePsGfh6N1HyJPi8qPkWfh5lygQF3Kqn8zYKyotZVp0049an1gjN');
                await stripe.redirectToCheckout({ sessionId });
            } catch (err) {
                console.error('Checkout error:', err);
                alert('Unable to process checkout. Please try again.');
                confirmBtn.disabled = false;
                confirmBtn.textContent = 'Confirm & Checkout';
            }
        }

        // Event Listeners
        buyBtn.addEventListener('click', openModal);
        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        prevBtn.addEventListener('click', prevSlide);
        nextBtn.addEventListener('click', nextSlide);

        carouselDots.forEach((dot, index) => {
            dot.addEventListener('click', () => showSlide(index));
        });

        // Size Guide
        sizeGuideBtn.addEventListener('click', () => {
            sizeGuidePopup.style.display = 'flex';
        });

        closeSizeGuide.addEventListener('click', () => {
            sizeGuidePopup.style.display = 'none';
        });

        sizeGuidePopup.addEventListener('click', (e) => {
            if (e.target === sizeGuidePopup) {
                sizeGuidePopup.style.display = 'none';
            }
        });

        // Checkout Button
        confirmBtn.addEventListener('click', handleCheckout);

        // Load Stripe.js
        const stripeScript = document.createElement('script');
        stripeScript.src = 'https://js.stripe.com/v3/';
        stripeScript.async = true;
        document.head.appendChild(stripeScript);
    })();
    </script>
</body>
</html>
