<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You! | TIC Corp.</title>
    <link rel="icon" type="image/png" href="/ticLOGO.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
        width: 100%;
        background-color: #000;
        color: #fff;
        font-family: "Source Code Pro", monospace;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .success-container {
        max-width: 480px;
        width: 90%;
        text-align: center;
        padding: 2rem;
        animation: fadeIn 0.6s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .success-logo {
        width: 80px;
        height: auto;
        margin-bottom: 1rem;
        opacity: 0.9;
      }

      .success-gif {
        width: 100%;
        max-width: 260px;
        height: auto;
        border-radius: 12px;
        margin-bottom: 1.5rem;
      }

      .success-container h1 {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 0.75rem;
        letter-spacing: -0.5px;
      }

      .success-container p {
        font-size: 13px;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 1rem;
      }

      .success-container a:not(.success-btn) {
        color: #fff;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .success-container a:not(.success-btn):hover {
        color: rgba(255, 255, 255, 0.8);
      }

      .success-btn {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 14px 32px;
        background-color: transparent;
        color: #fff;
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 50px;
        font-family: "Source Code Pro", monospace;
        font-size: 13px;
        font-weight: 500;
        transition: border-color 0.2s ease, color 0.2s ease;
      }

      .success-btn:hover {
        border-color: #fff;
        color: #fff;
        text-decoration: none;
      }

      .success-divider {
        width: 40px;
        height: 1px;
        background: rgba(255, 255, 255, 0.15);
        margin: 1.5rem auto;
      }

      .success-footer {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.3);
        margin-top: 2rem;
      }
    </style>
    <script type="module" src="/tap-feedback-init.js"></script>
  </head>
  <body>
    <div class="success-container">
      <img src="/rateryxLogo.png" alt="Rat'teryx" class="success-logo" />
      <div class="success-divider"></div>
      <img src="/timBG.gif" alt="Thank you" class="success-gif" />
      <h1>Thank You For Your Order</h1>
      <p>Your payment was successful. You'll receive a confirmation email with your receipt number shortly.</p>
      <p>Track your order anytime at <a href="https://www.laughwithtic.com/trackingportal" target="_blank">laughwithtic.com/trackingportal</a></p>
      <a href="/" class="success-btn">Back to Home</a>
      <div class="success-footer">TIC Corp.</div>
    </div>
  </body>
</html>
