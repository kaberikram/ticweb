<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | TIC Corp.</title>
  <link rel="icon" type="image/png" href="/ticLOGO.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: 'Source Code Pro', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }
    .checkout-header {
      margin-bottom: 1rem;
    }
    .checkout-header a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 14px;
    }
    .checkout-header a:hover { color: #fff; }
    #checkout {
      width: 100%;
      max-width: 480px;
      min-height: 400px;
    }
    .checkout-loading {
      text-align: center;
      padding: 2rem;
      color: rgba(255,255,255,0.6);
    }
    .checkout-error {
      text-align: center;
      padding: 2rem;
      color: #e57373;
    }
  </style>
</head>
<body>
  <header class="checkout-header">
    <a href="/">&larr; Back</a>
  </header>
  <main id="checkout">
    <p class="checkout-loading">Loading checkout…</p>
  </main>

  <script>
    (function() {
      const container = document.getElementById('checkout')

      function showError(msg) {
        container.innerHTML = '<p class="checkout-error">' + (msg || 'Checkout unavailable.') + '</p>'
      }

      async function getPublishableKey() {
        try {
          const r = await fetch('/api/config')
          const data = await r.json()
          return data.stripePublishableKey || ''
        } catch (e) {
          return ''
        }
      }

      async function initialize() {
        const key = await getPublishableKey()
        if (!key) {
          showError('Missing Stripe key. Set STRIPE_PUBLISHABLE_KEY in your environment.')
          return
        }

        const cartRaw = sessionStorage.getItem('checkoutCart')
        if (!cartRaw) {
          showError('No cart found. <a href="/" style="color:#fff;">Start from the jacket page</a>.')
          return
        }

        let cart
        try {
          cart = JSON.parse(cartRaw)
        } catch (e) {
          showError('Invalid cart.')
          return
        }

        if (!Array.isArray(cart) || cart.length === 0) {
          showError('Your cart is empty.')
          return
        }

        const stripe = Stripe(key)

        const fetchClientSecret = async () => {
          const response = await fetch('/api/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cart, embedded: true })
          })
          if (!response.ok) {
            const err = await response.json().catch(() => ({}))
            throw new Error(err.error?.message || err.error?.details || 'Could not start checkout')
          }
          const data = await response.json()
          if (!data.clientSecret) throw new Error('No client secret returned')
          return data.clientSecret
        }

        const onShippingDetailsChange = async (event) => {
          const { checkoutSessionId, shippingDetails } = event
          try {
            const response = await fetch('/api/update-shipping', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                checkout_session_id: checkoutSessionId,
                shipping_details: shippingDetails
              })
            })
            const data = await response.json().catch(() => ({}))
            if (!response.ok) {
              return Promise.resolve({
                type: 'reject',
                errorMessage: data.message || 'Could not update shipping.'
              })
            }
            if (data.type === 'error') {
              return Promise.resolve({ type: 'reject', errorMessage: data.message || 'Invalid address.' })
            }
            return Promise.resolve({ type: 'accept' })
          } catch (err) {
            return Promise.resolve({
              type: 'reject',
              errorMessage: err.message || 'Something went wrong.'
            })
          }
        }

        try {
          const checkout = await stripe.initEmbeddedCheckout({
            fetchClientSecret,
            onShippingDetailsChange
          })
          container.innerHTML = ''
          checkout.mount('#checkout')
        } catch (err) {
          console.error('Embedded Checkout init failed:', err)
          showError(err.message || 'Failed to load checkout.')
        }
      }

      initialize()
    })()
  </script>
</body>
</html>
